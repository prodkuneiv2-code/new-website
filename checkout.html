<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชำระเงิน | Raydee Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">Raydee<span>Solar</span></a>
            <ul class="nav-links">
                <li><a href="index.html#home">หน้าแรก</a></li>
                <li class="nav-social"><a href="https://www.facebook.com/profile.php?id=61578644667892"
                        target="_blank"><i class="fab fa-facebook-square"></i> Facebook</a>
                </li>
                <li class="nav-social"><a href="#" target="_blank"><i class="fab fa-line"></i> LINE</a></li>
                <li><a href="cart.html" class="cart-nav">🛒 ตะกร้า <span id="cart-count">0</span></a></li>
            </ul>
        </div>
    </nav>
    <div class="page-header">
        <div class="container">
            <h1>รายละเอียดการชำระเงิน</h1>
        </div>
    </div>
    <section class="section-padding" style="flex: 1;">
        <div class="container">
            <div class="checkout-grid">
                <div class="checkout-form">
                    <h3>ข้อมูลการจัดส่ง / ติดตั้ง</h3>
                    <form id="checkoutForm" style="margin-top:20px;">
                        <div class="form-group">
                            <label>ชื่อ-นามสกุล</label>
                            <input type="text" id="custName" class="form-control" placeholder="ระบุชื่อจริงและนามสกุล"
                                required>
                        </div>
                        <div class="form-group">
                            <label>เบอร์โทรศัพท์</label>
                            <input type="tel" id="custPhone" class="form-control" placeholder="เช่น 0891234567"
                                required>
                        </div>
                        <div class="form-group">
                            <label>อีเมล (ถ้ามี)</label>
                            <input type="email" id="custEmail" class="form-control" placeholder="example@email.com">
                        </div>
                        <div class="form-group">
                            <label>ที่อยู่การจัดส่ง / ติดตั้ง</label>
                            <textarea id="custAddress" class="form-control" rows="4"
                                placeholder="ระบุที่อยู่ให้ละเอียด บ้านเลขที่ ซอย ถนน ตำบล อำเภอ จังหวัด และรหัสไปรษณีย์"
                                required></textarea>
                        </div>
                        <button type="submit" class="btn btn-large"
                            style="width:100%; margin-top:20px; background-color: #00B900; color: white; border: none;">
                            <i class="fab fa-line" style="margin-right:8px;"></i> สั่งซื้อผ่าน LINE
                        </button>
                    </form>
                </div>
                <div class="checkout-summary-wrap">
                    <div class="cart-summary" style="margin:0; position: sticky; top: 100px;">
                        <h3>สรุปคำสั่งซื้อ</h3>
                        <hr style="margin:15px 0; border:0; border-top:1px solid var(--border-color);">
                        <div id="checkoutItems" style="margin-bottom:20px; font-size:0.95rem;">
                            <!-- Items from local storage -->
                        </div>
                        <div class="summary-row summary-total">
                            <span>ยอดชำระสุทธิ:</span>
                            <span id="checkoutTotal">฿0</span>
                        </div>
                        <div style="margin-top: 20px; text-align:center; font-size: 0.85rem; color: var(--text-muted);">
                            <p>🔒 ข้อมูลการชำระเงินของคุณปลอดภัย</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer" style="padding: 40px 0 20px;">
        <div class="container">
            <div class="footer-bottom" style="margin-top:0;">
                <p>&copy; 2026 RaydeeSolar. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Floating Social Icons -->
    <div class="floating-socials">
        <a href="tel:0891234567" class="social-icon phone-icon" title="โทรเลย"><i class="fas fa-phone"></i></a>
        <a href="#" class="social-icon line-icon" title="LINE"><i class="fab fa-line"></i></a>
        <a href="https://www.facebook.com/profile.php?id=61578644667892" target="_blank"
            class="social-icon messenger-icon" title="Messenger"><i class="fab fa-facebook-messenger"></i></a>
        <a href="#" class="social-icon tiktok-icon" title="TikTok"><i class="fab fa-tiktok"></i></a>
    </div>

    <script src="script.js"></script>
</body>

</html>
